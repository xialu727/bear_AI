        /**
         * 复制到剪贴板
         * @param {string} text - 要复制的文本
         * @param {Function} callback - 回调函数
         */
        function copyToClipboard(text, callback) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            textArea.style.top = '-9999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                if (callback) callback();
            } catch (err) {
                console.error('复制失败:', err);
            }
            document.body.removeChild(textArea);
        }

        /**
         * 为代码块添加操作按钮
         */
        function addCopyButtons() {
            document.querySelectorAll('pre code').forEach(codeBlock => {
                const preBlock = codeBlock.parentNode;
                if (preBlock.querySelector('.copy-code-btn') || preBlock.querySelector('.save-code-btn') || preBlock.querySelector('.code-run-btn')) {
                    return;
                }

                const language = codeBlock.className.replace('hljs language-', '');

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-code-btn';
                copyBtn.textContent = '复制';
                copyBtn.addEventListener('click', () => {
                    copyToClipboard(codeBlock.textContent, () => {
                        copyBtn.textContent = '已复制';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.textContent = '复制';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    });
                });
                preBlock.appendChild(copyBtn);

                const saveBtn = document.createElement('button');
                saveBtn.className = 'save-code-btn';
                saveBtn.innerHTML = '💾 保存';
                saveBtn.addEventListener('click', () => {
                    showSaveFileDialog(codeBlock.textContent, language);
                });
                preBlock.appendChild(saveBtn);

                if (language === 'python' || language === 'py' || language === 'javascript' || language === 'js') {
                    const runBtn = document.createElement('button');
                    runBtn.className = 'code-run-btn';
                    runBtn.innerHTML = '▶ 运行';
                    runBtn.title = `运行${language === 'python' || language === 'py' ? 'Python' : 'JavaScript'}代码`;
                    runBtn.addEventListener('click', async () => {
                        if (runBtn.classList.contains('running')) {
                            // 使用按钮上存储的 filePath 查找对应的 executionId
                            const filePath = runBtn.dataset.filePath;
                            const executionId = filePath ? runningByFile[filePath] : null;
                            
                            if (executionId) {
                                await stopRunningCode(runBtn, executionId);
                            }
                            return;
                        }
                        
                        runBtn.classList.add('running');
                        runBtn.innerHTML = '⏹ 停止';
                        
                        if (language === 'python' || language === 'py') {
                            await runPythonCode(codeBlock.textContent, preBlock, runBtn);
                        } else if (language === 'javascript' || language === 'js') {
                            await runJavaScriptCode(codeBlock.textContent, preBlock, runBtn);
                        }
                        
                        // 注意：这里不再立即改回按钮状态
                        // 按钮状态会在 pollOutput 完成后自动恢复
                    });
                    preBlock.appendChild(runBtn);
                }
            });
        }

        /**
         * 显示保存文件对话框
         * @param {string} code - 代码内容
         * @param {string} language - 语言类型
         */
        function showSaveFileDialog(code, language) {
            if (projects.length === 0) {
                alert('请先创建项目！点击右上角 + 号创建新项目。');
                return;
            }

            if (!currentProjectId) {
                alert('请先选择一个项目！');
                document.querySelector('.project-list').scrollIntoView({ behavior: 'smooth' });
                return;
            }

            const project = projects.find(p => p.id === currentProjectId);
            const defaultExt = getExtensionFromLanguage(language);
            const filename = prompt(`请输入文件名（默认扩展名：.${defaultExt}）`, `code_${Date.now()}.${defaultExt}`);
            if (!filename) return;

            const fullPath = prompt('请输入完整保存路径：', `${project.root_path}\\${filename}`);
            if (!fullPath) return;

            saveCodeToFile(currentProjectId, filename, fullPath, code, language);
        }

        /**
         * 根据语言获取文件扩展名
         * @param {string} language - 语言类型
         * @returns {string} 文件扩展名
         */
        function getExtensionFromLanguage(language) {
            const extMap = {
                'python': 'py', 'py': 'py', 'javascript': 'js', 'js': 'js',
                'html': 'html', 'css': 'css', 'json': 'json', 'markdown': 'md'
            };
            return extMap[language] || 'txt';
        }

        /**
         * 保存代码到文件
         * @param {number} projectId - 项目ID
         * @param {string} filename - 文件名
         * @param {string} filePath - 文件路径
         * @param {string} content - 代码内容
         * @param {string} language - 语言类型
         */
        async function saveCodeToFile(projectId, filename, filePath, content, language) {
            try {
                const fileTypes = {
                    'python': 'python', 'py': 'python', 'javascript': 'javascript', 'js': 'javascript',
                    'html': 'html', 'css': 'css'
                };

                await fetchJsonChecked('/api/files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        project_id: projectId,
                        filename: filename,
                        file_path: filePath,
                        content: content,
                        file_type: fileTypes[language] || '',
                        relative_path: filename
                    })
                });

                alert(`代码已保存到：${filePath}`);
                selectProject(projectId);
            } catch (error) {
                console.error('保存失败:', error);
                alert('保存失败：' + error.message);
            }
        }

        /**
         * 发送消息到AI
         */
        function send() {
            const text = input.value.trim();
            if (!text) return;

            // 根据聊天模式分发
            if (chatMode === 'ai') {
                sendAiChat();
            } else {
                runAiderFromChat();
            }
        }

        function sendAiChat() {
            const text = input.value.trim();

            lastQuestion = text;
            chatBox.innerHTML += `<div class="user-msg">${text}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const aiMsg = document.createElement('div');
            aiMsg.className = 'ai-msg';

            const msgActions = document.createElement('div');
            msgActions.className = 'msg-actions';

            const copyBtn = document.createElement('button');
            copyBtn.className = 'action-btn';
            copyBtn.innerHTML = '📋';
            copyBtn.title = '复制回答';
            msgActions.appendChild(copyBtn);

            const regenerateBtn = document.createElement('button');
            regenerateBtn.className = 'action-btn';
            regenerateBtn.innerHTML = '🔄';
            regenerateBtn.title = '重新生成';
            msgActions.appendChild(regenerateBtn);

            const answerContent = document.createElement('div');
            answerContent.className = 'ai-msg-content';

            aiMsg.appendChild(answerContent);
            aiMsg.appendChild(msgActions);
            chatBox.appendChild(aiMsg);
            chatBox.scrollTop = chatBox.scrollHeight;

            sendBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            isGenerating = true;
            fullResponse = "";

            socket.off('ai_response');
            socket.on('ai_response', (data) => {
                const content = data.content;
                if (content === '[DONE]') {
                    sendBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                    isGenerating = false;
                    addCopyButtons();
                    return;
                }
                const rawContent = content.replace(/\\n/g, '\n').replace(/\\r/g, '\r');
                fullResponse += rawContent;
                aiMsg.querySelector('.ai-msg-content').innerHTML = marked.parse(fullResponse);
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            socket.emit('ask_ai', { message: text });
        }

        /**
         * 使用 Aider 编辑代码
         */
        async function runAiderFromChat() {
            const prompt = input.value.trim();
            if (!prompt) {
                showToast('请输入要修改的代码描述', 'warning');
                return;
            }

            // 校验是否已选择项目
            if (!currentProjectId) {
                showToast('请先选择一个项目', 'warning');
                return;
            }

            // 获取 Aider 选中的文件（如果有）
            let targetRelativePath = '';
            if (aiderSelectedFileId) {
                try {
                    const response = await fetch(`/api/files/${aiderSelectedFileId}`);
                    if (response.ok) {
                        const fileData = await response.json();
                        // /api/files/:id 返回扁平对象，直接读取 fileData.project_id / fileData.relative_path
                        if (fileData.project_id === currentProjectId) {
                            targetRelativePath = fileData.relative_path;
                        }
                    }
                } catch (error) {
                    console.error('获取文件信息失败:', error);
                }
            }

            // 显示用户消息
            chatBox.innerHTML += `<div class="user-msg">${prompt}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 创建空的 AI 消息容器（用于实时显示 Aider 输出）
            const aiMsg = document.createElement('div');
            aiMsg.className = 'ai-msg';
            const contentEl = document.createElement('div');
            contentEl.className = 'ai-msg-content';
            contentEl.innerHTML = '';
            aiMsg.appendChild(contentEl);
            chatBox.appendChild(aiMsg);
            chatBox.scrollTop = chatBox.scrollHeight;

            // 调用 /api/run 启动 Aider
            try {
                const result = await fetchJsonChecked('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        run_mode: 'aider',
                        project_id: currentProjectId,
                        prompt: prompt,
                        target_relative_path: targetRelativePath,
                        source: 'chat',
                        client_id: clientId,
                        use_selected_context: !!aiderSelectedFileId
                    })
                });

                // 记录 Aider 聊天任务映射
                aiderChatMap[result.execution_id] = {
                    aiMsgEl: aiMsg,
                    contentEl: contentEl,
                    bufferText: '',
                    prompt: prompt
                };

                // 创建运行任务记录
                runningTasks[result.execution_id] = {
                    isRunning: true,
                    offset: 0,
                    runBtn: null,
                    runMode: 'aider',
                    targetAbsPath: result.target_abs_path
                };

                // 开始轮询输出
                pollOutput(result.execution_id, result.target_abs_path);

            } catch (error) {
                contentEl.innerHTML = `❌ 错误: ${error.message}`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        /**
         * 停止AI生成
         */
        function stopGeneration() {
            socket.emit('stop_generation');
            sendBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            isGenerating = false;
        }

        /**
         * 处理聊天框点击事件
         */
        chatBox.addEventListener('click', function(e) {
            // 处理复制按钮点击
            const copyBtn = e.target.closest('.action-btn[title="复制回答"]');
            if (copyBtn) {
                const msgDiv = copyBtn.closest('.ai-msg');
                const contentDiv = msgDiv ? msgDiv.querySelector('.ai-msg-content') : null;
                if (contentDiv) {
                    copyToClipboard(contentDiv.textContent, () => {
                        copyBtn.innerHTML = '✅';
                        setTimeout(() => copyBtn.innerHTML = '📋', 1000);
                    });
                }
            }

            // 处理重新生成按钮点击
            const regenerateBtn = e.target.closest('.action-btn[title="重新生成"]');
            if (regenerateBtn) {
                const allAiMsgs = chatBox.querySelectorAll('.ai-msg');
                const msgDiv = regenerateBtn.closest('.ai-msg');
                const isLastMsg = msgDiv === allAiMsgs[allAiMsgs.length - 1];

                if (isLastMsg && lastQuestion) {
                    msgDiv.querySelector('.ai-msg-content').innerHTML = '';
                    sendBtn.style.display = 'none';
                    stopBtn.style.display = 'inline-block';
                    isGenerating = true;
                    fullResponse = "";
                    socket.emit('ask_ai', { message: lastQuestion });
                }
            }
        });

        /**
         * 处理输入框回车事件
         */
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') send();
        });

        // 初始化聊天模式（统一入口，强制设为 ai 模式）
        applyChatMode('ai', false);
        
        // 监听聊天模式变化
        domElements.chatModeSelect.addEventListener('change', () => {
            applyChatMode(domElements.chatModeSelect.value, false);
        });

        // 更新输入框 placeholder
        function updateInputPlaceholder() {
            domElements.input.placeholder = '请输入...';
        }

        // 初始化加载项目列表
        loadProjects();
    </script>
</body>
</html>
